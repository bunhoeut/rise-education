<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ប្រធានបទ — Rise Education</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

/* ─── PILLAR GRID — Option B 2-col ─── */
.pillar-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}

.pillar-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 14px;
  background: #fff;
  border: 1.5px solid #e2e8f0;
  border-radius: 16px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.18s ease;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  overflow: hidden;
}

.pillar-btn:active {
  transform: scale(0.97);
}

.pillar-btn.active {
  border-color: #d97706;
  background: #fffbf0;
  box-shadow: 0 0 0 3px rgba(217,119,6,0.1);
}

.pillar-btn:hover {
  border-color: #cbd5e1;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  transform: translateY(-1px);
}

.pillar-btn.active:hover {
  transform: translateY(-1px);
}

.pillar-icon-wrap {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.pillar-btn-text {
  flex: 1;
  min-width: 0;
}

.pillar-btn-kh {
  font-family: 'Noto Sans Khmer', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.5;
  word-break: break-word;
}

.pillar-btn-en {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: #94a3b8;
  font-weight: 500;
  letter-spacing: 0.03em;
  margin-top: 1px;
}

.pillar-btn.active .pillar-btn-kh {
  color: #92400e;
}

.pillar-btn.active .pillar-btn-en {
  color: #d97706;
}

/* Active check indicator */
.pillar-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #d97706;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.pillar-check svg {
  width: 10px;
  height: 10px;
}

.pillar-btn.active .pillar-check {
  display: flex;
}

/* All button — full width */
.pillar-btn-all {
  grid-column: 1 / -1;
  background: #0f172a;
  border-color: #0f172a;
  padding: 14px 20px;
  border-radius: 14px;
}

.pillar-btn-all .pillar-btn-kh {
  color: #fff;
  font-size: 14px;
}

.pillar-btn-all .pillar-btn-en {
  color: rgba(255,255,255,0.5);
}

.pillar-btn-all.active {
  background: linear-gradient(135deg, #d97706, #f59e0b);
  border-color: #d97706;
  box-shadow: 0 4px 16px rgba(217,119,6,0.3);
}

.pillar-btn-all.active .pillar-btn-kh {
  color: #fff;
}

.pillar-btn-all .pillar-check {
  background: rgba(255,255,255,0.3);
}

/* ─── FILTER BAR ─── */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'Noto Sans Khmer', sans-serif;
  font-size: 13px;
  padding: 8px 18px;
  border-radius: 100px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #475569;
  cursor: pointer;
  transition: all 0.15s;
  font-weight: 600;
  -webkit-tap-highlight-color: transparent;
}

.filter-btn:active { transform: scale(0.96); }

.filter-btn.active {
  background: #0f172a;
  border-color: #0f172a;
  color: #fff;
}

/* ─── PAGE HEADER ─── */
.pillar-page-header {
  background: #fff;
  border-bottom: 1px solid #e2e8f0;
  padding: 32px 0 28px;
}

.pillar-page-title {
  font-family: 'Noto Sans Khmer', sans-serif;
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 700;
  color: #0f172a;
  line-height: 1.3;
  margin-bottom: 4px;
}

.pillar-page-sub {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 0;
}

/* ─── SECTION DIVIDER ─── */
.section-divider {
  height: 1px;
  background: #f1f5f9;
  margin: 20px 0;
}

</style>
</head>
<body>
<div id="nav-placeholder"></div>

<main>
  <div id="pillar-header"></div>

  <section class="section" style="padding-top:0">
    <div class="container">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" onclick="filterArticles('all', this)">ទាំងអស់</button>
        <button class="filter-btn" onclick="filterArticles('free', this)">ឥតគិតថ្លៃ</button>
        <button class="filter-btn" onclick="filterArticles('vip', this)">⭐ ពិសេស</button>
      </div>
      <div class="articles-grid" id="articles-grid">
        <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted);font-family:'Noto Sans Khmer',serif">
          កំពុងផ្ទុក...
        </div>
      </div>
      <div id="empty-state" class="hidden" style="text-align:center;padding:64px 0">
        <div style="font-size:48px;margin-bottom:12px">📭</div>
        <div style="font-family:'Noto Sans Khmer',serif;color:var(--muted)">មិនទាន់មានអត្ថបទក្នុងប្រភេទនេះ</div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>
<script src="app.js"></script>
<script>
let allArticles = [];
let currentFilter = 'all';
const pillarId = getParam('pillar');
const isVIP = Session.isVIP();

(async function() {
  initPage('pillars');
  const articles = await DB.getArticles();

  if (pillarId) {
    // ─── Single pillar page ───
    const pillar = getPillar(pillarId);
    allArticles = articles.filter(a => a.pillar === pillarId);
    document.title = `${pillar.kh} — Rise Education`;

    document.getElementById('pillar-header').innerHTML = `
      <div style="background:${pillar.color}0d;border-bottom:1px solid ${pillar.color}22;padding:36px 0 28px">
        <div class="container">
          <a href="pillar.html" style="font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;font-family:'Noto Sans Khmer',serif;text-decoration:none">
            ← ត្រឡប់ប្រធានបទ
          </a>
          <div style="display:flex;align-items:center;gap:14px;margin-bottom:8px">
            <div style="width:52px;height:52px;border-radius:16px;background:${pillar.color}22;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">
              ${pillar.icon}
            </div>
            <div>
              <h1 style="font-family:'Noto Sans Khmer',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:700;color:${pillar.color};line-height:1.3;margin:0">${pillar.kh}</h1>
              <div style="font-family:'Inter',sans-serif;font-size:13px;color:var(--muted);margin-top:2px">${pillar.en}</div>
            </div>
          </div>
          <div id="article-count" style="font-family:'Noto Sans Khmer',serif;font-size:13px;color:var(--muted);margin-top:4px"></div>
        </div>
      </div>`;

  } else {
    // ─── All pillars page ───
    allArticles = articles;
    document.title = `ប្រធានបទទាំងអស់ — Rise Education`;

    document.getElementById('pillar-header').innerHTML = `
      <div class="pillar-page-header">
        <div class="container">

          <h1 class="pillar-page-title">ប្រធានបទទាំងអស់</h1>
          <p class="pillar-page-sub">All Content Pillars</p>

          <!-- Option B: 2-column grid -->
          <div class="pillar-grid">

            <!-- All button — full width -->
            <a class="pillar-btn pillar-btn-all active" href="pillar.html">
              <div class="pillar-icon-wrap" style="background:rgba(255,255,255,0.12)">⭐</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ប្រធានបទទាំងអស់</div>
                <div class="pillar-btn-en">All Pillars</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

            <!-- Growth -->
            <a class="pillar-btn" href="pillar.html?pillar=growth">
              <div class="pillar-icon-wrap" style="background:#f0fde4">🌱</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ការអភិវឌ្ឍខ្លួន</div>
                <div class="pillar-btn-en">Personal Growth</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

            <!-- Study -->
            <a class="pillar-btn" href="pillar.html?pillar=study">
              <div class="pillar-icon-wrap" style="background:#e0f7ff">📚</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ជំនាញសិក្សា</div>
                <div class="pillar-btn-en">Study Skills</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

            <!-- Life -->
            <a class="pillar-btn" href="pillar.html?pillar=life">
              <div class="pillar-icon-wrap" style="background:#fff3e0">💡</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ជំនាញជីវិត</div>
                <div class="pillar-btn-en">Life Skills</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

            <!-- Career -->
            <a class="pillar-btn" href="pillar.html?pillar=career">
              <div class="pillar-icon-wrap" style="background:#f3e8ff">🚀</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ការរីកចម្រើនអាជីព</div>
                <div class="pillar-btn-en">Career Growth</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

            <!-- Finance -->
            <a class="pillar-btn" href="pillar.html?pillar=finance">
              <div class="pillar-icon-wrap" style="background:#e8fff3">💰</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ហិរញ្ញវត្ថុ</div>
                <div class="pillar-btn-en">Personal Finance</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

            <!-- Communication -->
            <a class="pillar-btn" href="pillar.html?pillar=comm">
              <div class="pillar-icon-wrap" style="background:#fff0f5">🗣️</div>
              <div class="pillar-btn-text">
                <div class="pillar-btn-kh">ទំនាក់ទំនង & ភាសា</div>
                <div class="pillar-btn-en">Communication</div>
              </div>
              <div class="pillar-check">
                <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
              </div>
            </a>

          </div>

          <div class="section-divider"></div>

        </div>
      </div>`;
  }

  renderArticles();
})();

function filterArticles(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles();
}

function renderArticles() {
  const grid = document.getElementById('articles-grid');
  const empty = document.getElementById('empty-state');
  const countEl = document.getElementById('article-count');

  let filtered = allArticles;
  if (currentFilter !== 'all') filtered = allArticles.filter(a => a.access === currentFilter);

  if (countEl) countEl.textContent = `អត្ថបទ ${filtered.length} ក្នុងប្រភេទនេះ`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
  } else {
    empty.classList.add('hidden');
    grid.innerHTML = filtered.map(a => buildArticleCard(a, isVIP)).join('');
  }
}
</script>
</body>
</html>
